<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEON SNAKE</title>
<style>
  :root {
    --bg0: #0a0a14;
    --bg1: #14142a;
    --text: #e6e9ff;
    --dim: #8b8fb5;
    --accent: #94e2d5;
    --food: #f38ba8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: radial-gradient(ellipse at 50% 0%, #1a1a3a 0%, var(--bg0) 70%);
    color: var(--text);
    font-family: "Segoe UI", Consolas, system-ui, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px;
    overflow-x: hidden;
  }
  .title {
    font-weight: 800;
    font-size: clamp(26px, 6vw, 42px);
    letter-spacing: 6px;
    margin: 0;
    background: linear-gradient(90deg, #94e2d5, #a6e3a1, #f9e2af, #f38ba8, #cba6f7);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 14px rgba(148, 226, 213, 0.35));
    animation: hue 8s linear infinite;
  }
  @keyframes hue { to { filter: drop-shadow(0 0 14px rgba(148,226,213,0.35)) hue-rotate(360deg); } }

  .stage { position: relative; }
  canvas {
    display: block;
    background: #0d0d1a;
    border-radius: 14px;
    box-shadow: 0 0 0 1px rgba(148,226,213,0.15), 0 20px 60px rgba(0,0,0,0.6),
                0 0 60px rgba(148,226,213,0.08);
    touch-action: none;
    max-width: 100%;
    height: auto;
  }

  /* ---- Menu overlay ---- */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 18px;
    background: rgba(10, 10, 20, 0.82);
    backdrop-filter: blur(3px);
    border-radius: 14px;
    text-align: center;
  }
  .overlay.hidden { display: none; }
  .overlay h2 {
    margin: 0 0 2px;
    font-size: clamp(16px, 4vw, 22px);
    letter-spacing: 3px;
    color: var(--accent);
  }
  .modes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 500px;
  }
  .mode-card {
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 12px 12px 11px;
    background: linear-gradient(160deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
    cursor: pointer;
    text-align: left;
    transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
    color: var(--text);
  }
  .mode-card:hover { transform: translateY(-3px); }
  .mode-card:focus-visible { outline: 2px solid var(--accent); }
  .mode-card .mc-name { font-weight: 700; font-size: 15px; margin-bottom: 3px; }
  .mode-card .mc-desc { font-size: 11.5px; color: var(--dim); line-height: 1.45; }
  .mode-card[data-mode="zen"]:hover      { border-color:#a6e3a1; box-shadow:0 0 22px rgba(166,227,161,.25); }
  .mode-card[data-mode="arcade"]:hover   { border-color:#89b4fa; box-shadow:0 0 22px rgba(137,180,250,.25); }
  .mode-card[data-mode="time"]:hover     { border-color:#f9e2af; box-shadow:0 0 22px rgba(249,226,175,.25); }
  .mode-card[data-mode="chaos"]:hover    { border-color:#cba6f7; box-shadow:0 0 22px rgba(203,166,247,.25); }
  .mode-card.mode-wide { grid-column: 1 / -1; }
  .mode-card[data-mode="classic"]:hover { border-color:#94e2d5; box-shadow:0 0 22px rgba(148,226,213,.28); }
  .mc-tag { font-size:10px; letter-spacing:1px; text-transform:uppercase; opacity:.7; }
  .mc-tag.classic{color:#94e2d5}.mc-tag.zen{color:#a6e3a1}.mc-tag.arcade{color:#89b4fa}.mc-tag.time{color:#f9e2af}.mc-tag.chaos{color:#cba6f7}

  /* ---- Pause / call menu ---- */
  .pause-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 300px;
  }
  .pause-panel h2 { margin: 0 0 6px; font-size: 24px; letter-spacing: 4px; }
  .menu-btn {
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    padding: 13px 20px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background .12s ease, border-color .12s ease, transform .12s ease;
  }
  .menu-btn:hover { transform: translateY(-2px); }
  .menu-btn.primary { border-color: var(--accent); color: var(--accent); background: rgba(148,226,213,0.12); }
  .menu-btn.primary:hover { background: rgba(148,226,213,0.22); }
  .menu-btn.danger:hover { border-color:#f38ba8; color:#f38ba8; background: rgba(243,139,168,0.12); }

  .hint { font-size: 12.5px; color: var(--dim); text-align: center; line-height: 1.7; }
  kbd {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 5px;
    padding: 1px 7px;
    font-size: 11.5px;
    color: var(--text);
  }
  .btn {
    margin-top: 4px;
    border: 1px solid var(--accent);
    background: rgba(148,226,213,0.12);
    color: var(--accent);
    padding: 9px 22px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background .12s ease, transform .12s ease;
  }
  .btn:hover { background: rgba(148,226,213,0.22); transform: translateY(-1px); }
</style>
</head>
<body>
  <h1 class="title">NEON SNAKE</h1>

  <div class="stage">
    <canvas id="board" width="600" height="400"></canvas>

    <!-- Mode-select menu -->
    <div class="overlay" id="menu">
      <h2>CHOOSE YOUR MODE</h2>
      <div class="modes">
        <button class="mode-card mode-wide" data-mode="classic">
          <div class="mc-tag classic">Normal Match</div>
          <div class="mc-name">🐍 Classic</div>
          <div class="mc-desc">The original snake. Solid walls, don't hit yourself. Pure &amp; simple.</div>
        </button>
        <button class="mode-card" data-mode="zen">
          <div class="mc-tag zen">Relax</div>
          <div class="mc-name">🌿 Zen / No-Die</div>
          <div class="mc-desc">Walls wrap around. Hitting your tail just trims you — no death, no pressure.</div>
        </button>
        <button class="mode-card" data-mode="arcade">
          <div class="mc-tag arcade">Progress</div>
          <div class="mc-name">🎯 Arcade</div>
          <div class="mc-desc">Levels with obstacles &amp; portals. Hit the target score to advance.</div>
        </button>
        <button class="mode-card" data-mode="time">
          <div class="mc-tag time">Rush</div>
          <div class="mc-name">⏱️ Speed Freak</div>
          <div class="mc-desc">Beat the clock. Every fruit adds seconds — route aggressively.</div>
        </button>
        <button class="mode-card" data-mode="chaos">
          <div class="mc-tag chaos">Wild</div>
          <div class="mc-name">🌀 Chaos / Quantum</div>
          <div class="mc-desc">Inverted controls, glitches, screen shake &amp; random portals. Pure madness.</div>
        </button>
      </div>
      <div class="hint">
        <kbd>Arrows</kbd> / <kbd>WASD</kbd> move · <kbd>Space</kbd> pause · <kbd>R</kbd> restart · <kbd>Esc</kbd> menu · swipe on touch
      </div>
    </div>

    <!-- In-game pause / call menu (opened with Esc) -->
    <div class="overlay hidden" id="pauseMenu">
      <div class="pause-panel">
        <h2>PAUSED</h2>
        <button class="menu-btn primary" id="btnResume">▶  Resume</button>
        <button class="menu-btn" id="btnMainMenu">☰  Exit to Main Menu</button>
        <button class="menu-btn danger" id="btnExit">✕  Exit Game</button>
      </div>
    </div>

    <!-- Goodbye screen -->
    <div class="overlay hidden" id="byeScreen">
      <div class="pause-panel" style="text-align:center;">
        <h2 style="color:var(--accent);">👋 THANKS FOR PLAYING</h2>
        <div class="hint">You can close this tab now.</div>
        <button class="menu-btn primary" id="btnBackFromBye">Back to Menu</button>
      </div>
    </div>
  </div>

<script>
/* =========================================================================
   NEON SNAKE  —  four modes, neon graphics, particles, screen shake.
   Ports & extends the original snake.py. Leaderboard in localStorage.
   ========================================================================= */

// ---- Grid / timing config ----------------------------------------------
const CELL = 20;
const GW = 30, GH = 20;
const WIDTH = GW * CELL, HEIGHT = GH * CELL;
const START_SPEED = 120, MIN_SPEED = 60, SPEED_STEP = 4;
const MAX_SCORES = 10;

// ---- Palette ------------------------------------------------------------
const COL = {
  bg: "#0d0d1a",
  grid: "rgba(148,226,213,0.05)",
  snake: "#a6e3a1",
  head: "#94e2d5",
  food: "#f38ba8",
  text: "#e6e9ff",
  dim: "#8b8fb5",
  obstacle: "#585b8f",
  portalA: "#89b4fa",
  portalB: "#f9e2af",
};

// ---- Mode definitions ---------------------------------------------------
const MODES = {
  classic:{ name: "Classic",     accent: "#94e2d5", wrap: false, selfShrink: false, obstacles: false, portals: false, timer: false, chaos: false },
  zen:    { name: "Zen",         accent: "#a6e3a1", wrap: true,  selfShrink: true,  obstacles: false, portals: false, timer: false, chaos: false },
  arcade: { name: "Arcade",      accent: "#89b4fa", wrap: false, selfShrink: false, obstacles: true,  portals: true,  timer: false, chaos: false },
  time:   { name: "Speed Freak", accent: "#f9e2af", wrap: false, selfShrink: false, obstacles: false, portals: false, timer: true,  chaos: false },
  chaos:  { name: "Chaos",       accent: "#cba6f7", wrap: true,  selfShrink: false, obstacles: true,  portals: true,  timer: false, chaos: true },
};

// Time-attack tuning.
const TIME_START = 30, TIME_PER_FOOD = 3;

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const menuEl = document.getElementById("menu");
const pauseMenuEl = document.getElementById("pauseMenu");
const byeScreenEl = document.getElementById("byeScreen");
let pauseMenuOpen = false;

// ---- Leaderboard (localStorage, per mode) -------------------------------
const keyFor = (m) => "neon_snake_scores_" + m;
function loadScores(m) {
  try { const a = JSON.parse(localStorage.getItem(keyFor(m)) || "[]"); return Array.isArray(a) ? a : []; }
  catch { return []; }
}
function topScores(m, limit = MAX_SCORES) {
  const l = loadScores(m);
  l.sort((a, b) => b.score - a.score || a.created - b.created);
  return l.slice(0, limit);
}
function addScore(m, name, score) {
  const l = loadScores(m);
  l.push({ name: name.slice(0, 14), score, created: Date.now() });
  l.sort((a, b) => b.score - a.score || a.created - b.created);
  try { localStorage.setItem(keyFor(m), JSON.stringify(l.slice(0, MAX_SCORES))); } catch {}
}
function qualifies(m, score) {
  if (score <= 0) return false;
  const t = topScores(m);
  return t.length < MAX_SCORES || score > t[t.length - 1].score;
}

// ---- Game state ---------------------------------------------------------
let mode, cfg, running = false;
let snake, dir, nextDir, food, score, speed, paused, gameOver, recorded, board;
let level, target, obstacles, portals;
let timeLeft;                       // seconds (time-attack)
let particles, shake, glitch;       // fx
let invertUntil, nextInvertAt;      // chaos control inversion
let flashText;                      // transient banner ("LEVEL 2!", "INVERTED!")
let flashUntil;
let moveAcc = 0, lastT = 0;

const key = (x, y) => x + "," + y;

function startGame(m) {
  mode = m;
  cfg = MODES[m];
  document.documentElement.style.setProperty("--accent", cfg.accent);
  menuEl.classList.add("hidden");
  pauseMenuEl.classList.add("hidden");
  byeScreenEl.classList.add("hidden");
  pauseMenuOpen = false;
  running = true;
  level = 1;
  reset(true);
  lastT = performance.now();
}

function reset(fullRestart) {
  const mx = Math.floor(GW / 2), my = Math.floor(GH / 2);
  snake = [[mx, my], [mx - 1, my], [mx - 2, my]];
  dir = [1, 0]; nextDir = [1, 0];
  score = fullRestart ? 0 : score;
  speed = START_SPEED;
  paused = false; gameOver = false; recorded = false;
  particles = []; shake = 0; glitch = 0;
  invertUntil = 0; nextInvertAt = performance.now() + 6000;
  flashText = null; flashUntil = 0;
  if (cfg.timer) timeLeft = TIME_START;
  buildLevel();
  food = randomFood();
  board = topScores(mode);
}

// ---- Level / obstacle / portal generation -------------------------------
function buildLevel() {
  obstacles = new Set();
  portals = [];
  if (cfg.obstacles) {
    const count = cfg.chaos ? 10 : 4 + level * 3;
    let tries = 0;
    while (obstacles.size < count && tries < 500) {
      tries++;
      const x = 2 + Math.floor(Math.random() * (GW - 4));
      const y = 2 + Math.floor(Math.random() * (GH - 4));
      // Keep the spawn row clear so you don't start trapped.
      if (Math.abs(y - Math.floor(GH / 2)) <= 1) continue;
      obstacles.add(key(x, y));
    }
  }
  if (cfg.portals) {
    const pairs = cfg.chaos ? 2 : 1;
    for (let p = 0; p < pairs; p++) {
      const a = freeCell(), b = freeCell();
      if (a && b) portals.push([a, b]);
    }
  }
  if (!cfg.obstacles) { /* time / zen: open field */ }
  // Advance target for arcade progression.
  target = 5 + (level - 1) * 5;
}

function occupiedByThings(x, y) {
  if (obstacles && obstacles.has(key(x, y))) return true;
  return false;
}
function freeCell() {
  const snakeSet = new Set((snake || []).map(c => key(c[0], c[1])));
  for (let t = 0; t < 200; t++) {
    const x = Math.floor(Math.random() * GW), y = Math.floor(Math.random() * GH);
    if (snakeSet.has(key(x, y))) continue;
    if (occupiedByThings(x, y)) continue;
    return [x, y];
  }
  return null;
}
function randomFood() {
  const snakeSet = new Set(snake.map(c => key(c[0], c[1])));
  const empty = [];
  for (let x = 0; x < GW; x++) for (let y = 0; y < GH; y++) {
    const k = key(x, y);
    if (snakeSet.has(k) || occupiedByThings(x, y)) continue;
    empty.push([x, y]);
  }
  return empty.length ? empty[(Math.random() * empty.length) | 0] : null;
}

// ---- Input --------------------------------------------------------------
const DIRS = {
  arrowup: [0,-1], w:[0,-1], arrowdown:[0,1], s:[0,1],
  arrowleft:[-1,0], a:[-1,0], arrowright:[1,0], d:[1,0],
};
function setDir(nd) {
  // Apply chaos inversion.
  if (performance.now() < invertUntil) nd = [-nd[0], -nd[1]];
  const [cdx, cdy] = dir;
  if (nd[0] !== -cdx || nd[1] !== -cdy) nextDir = nd;
}
document.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (k === "escape") {
    e.preventDefault();
    if (pauseMenuOpen) resumeGame();
    else if (running) openPauseMenu();
    return;
  }
  if (!running || pauseMenuOpen) return;
  if (k === "r") { reset(true); return; }
  if (k === " " || k === "p") {
    if (!gameOver) { paused = !paused; e.preventDefault(); }
    return;
  }
  if (k in DIRS) { e.preventDefault(); setDir(DIRS[k]); }
});

// ---- Pause / call menu -------------------------------------------------
function openPauseMenu() {
  pauseMenuOpen = true;
  paused = true;
  pauseMenuEl.classList.remove("hidden");
}
function resumeGame() {
  pauseMenuOpen = false;
  paused = false;
  pauseMenuEl.classList.add("hidden");
  lastT = performance.now();   // avoid a time jump after being paused
}
function toMenu() {
  running = false;
  pauseMenuOpen = false;
  paused = false;
  pauseMenuEl.classList.add("hidden");
  byeScreenEl.classList.add("hidden");
  menuEl.classList.remove("hidden");
}
function exitGame() {
  running = false;
  pauseMenuOpen = false;
  pauseMenuEl.classList.add("hidden");
  menuEl.classList.add("hidden");
  byeScreenEl.classList.remove("hidden");
  window.close();  // works if the tab was opened by a script; otherwise shows the goodbye screen
}
document.getElementById("btnResume").addEventListener("click", resumeGame);
document.getElementById("btnMainMenu").addEventListener("click", toMenu);
document.getElementById("btnExit").addEventListener("click", exitGame);
document.getElementById("btnBackFromBye").addEventListener("click", toMenu);

// Touch / swipe.
let touch0 = null;
canvas.addEventListener("touchstart", (e) => {
  touch0 = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
canvas.addEventListener("touchend", (e) => {
  if (!touch0 || !running || pauseMenuOpen) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touch0.x, dy = t.clientY - touch0.y;
  touch0 = null;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) {
    if (gameOver) reset(true); else paused = !paused;
    return;
  }
  if (gameOver) { reset(true); return; }
  setDir(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? [1,0] : [-1,0]) : (dy > 0 ? [0,1] : [0,-1]));
}, { passive: true });

// Menu buttons.
document.querySelectorAll(".mode-card").forEach(btn => {
  btn.addEventListener("click", () => startGame(btn.dataset.mode));
});

// ---- Update -------------------------------------------------------------
function step() {
  if (paused || gameOver) return;

  // Chaos: schedule random control inversion.
  if (cfg.chaos && performance.now() > nextInvertAt) {
    invertUntil = performance.now() + 4000;
    nextInvertAt = performance.now() + 8000 + Math.random() * 6000;
    glitch = 1; shake = Math.max(shake, 8);
    banner("⚡ CONTROLS INVERTED ⚡");
  }

  dir = nextDir;
  let [hx, hy] = snake[0];
  let nx = hx + dir[0], ny = hy + dir[1];

  // Walls: wrap or die.
  if (nx < 0 || nx >= GW || ny < 0 || ny >= GH) {
    if (cfg.wrap) { nx = (nx + GW) % GW; ny = (ny + GH) % GH; }
    else { return die(); }
  }

  // Portals.
  for (const [a, b] of portals) {
    if (nx === a[0] && ny === a[1]) { nx = b[0]; ny = b[1]; shake = Math.max(shake,4); break; }
    if (nx === b[0] && ny === b[1]) { nx = a[0]; ny = a[1]; shake = Math.max(shake,4); break; }
  }

  // Obstacles.
  if (occupiedByThings(nx, ny)) return die();

  // Self collision.
  const hitIdx = snake.findIndex((c, i) => i < snake.length - 1 && c[0] === nx && c[1] === ny);
  if (hitIdx !== -1) {
    if (cfg.selfShrink) {
      // Zen: trim the snake at the point you hit (lose those segments, keep playing).
      snake = snake.slice(0, Math.max(hitIdx, 2));
      spawnParticles(nx, ny, COL.head, 10);
      shake = Math.max(shake, 4);
    } else {
      return die();
    }
  }

  snake.unshift([nx, ny]);

  if (food && nx === food[0] && ny === food[1]) {
    score++;
    speed = Math.max(MIN_SPEED, speed - SPEED_STEP);
    spawnParticles(nx, ny, COL.food, 16);
    shake = Math.max(shake, 3);
    if (cfg.timer) timeLeft += TIME_PER_FOOD;
    food = randomFood();
    if (food === null) return win();
    // Arcade level progression.
    if (mode === "arcade" && score >= target) {
      level++;
      banner("LEVEL " + level + "!");
      reset(false);           // keep score, new layout, reset snake
    }
  } else {
    snake.pop();
  }
}

function die() {
  gameOver = true;
  shake = 14; glitch = cfg.chaos ? 1 : 0.4;
  spawnParticles(snake[0][0], snake[0][1], COL.food, 26);
  if (!recorded) handleGameOver(false);
}
function win() {
  gameOver = true; shake = 10;
  if (!recorded) handleGameOver(true);
}
function handleGameOver(won) {
  recorded = true;
  if (qualifies(mode, score)) {
    setTimeout(() => {
      const name = window.prompt(`New High Score! (${MODES[mode].name})\nScore: ${score}\nEnter your name:`, "");
      if (name && name.trim()) addScore(mode, name.trim(), score);
      board = topScores(mode);
    }, 60);
  }
  board = topScores(mode);
}

function banner(text) { flashText = text; flashUntil = performance.now() + 1400; }

// ---- Particles ----------------------------------------------------------
function spawnParticles(cx, cy, color, n) {
  const px = cx * CELL + CELL / 2, py = cy * CELL + CELL / 2;
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * Math.PI * 2, sp = 0.6 + Math.random() * 2.4;
    particles.push({ x: px, y: py, vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp,
                     life: 1, color, r: 1 + Math.random()*2.5 });
  }
  if (particles.length > 400) particles.splice(0, particles.length - 400);
}
function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx * dt * 0.06; p.y += p.vy * dt * 0.06;
    p.vx *= 0.96; p.vy *= 0.96; p.life -= dt * 0.0016;
  }
  particles = particles.filter(p => p.life > 0);
}

// ---- Rounded rect helper ------------------------------------------------
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

// ---- Render -------------------------------------------------------------
function render(now) {
  const t = now / 1000;

  ctx.save();

  // Screen shake.
  if (shake > 0.2) {
    ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
  }

  // Background gradient.
  const bg = ctx.createLinearGradient(0, 0, 0, HEIGHT);
  bg.addColorStop(0, "#12122a"); bg.addColorStop(1, "#0a0a14");
  ctx.fillStyle = bg;
  ctx.fillRect(-20, -20, WIDTH + 40, HEIGHT + 40);

  // Subtle grid.
  ctx.strokeStyle = COL.grid; ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x <= WIDTH; x += CELL) { ctx.moveTo(x + .5, 0); ctx.lineTo(x + .5, HEIGHT); }
  for (let y = 0; y <= HEIGHT; y += CELL) { ctx.moveTo(0, y + .5); ctx.lineTo(WIDTH, y + .5); }
  ctx.stroke();

  // Obstacles.
  ctx.shadowBlur = 0;
  for (const o of obstacles) {
    const [ox, oy] = o.split(",").map(Number);
    ctx.fillStyle = COL.obstacle;
    roundRect(ox*CELL+2, oy*CELL+2, CELL-4, CELL-4, 4); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.08)";
    roundRect(ox*CELL+2, oy*CELL+2, CELL-4, (CELL-4)/2, 4); ctx.fill();
  }

  // Portals (swirling glow rings).
  portals.forEach(([a, b], i) => {
    drawPortal(a, COL.portalA, t + i);
    drawPortal(b, COL.portalB, t + i + 0.5);
  });

  // Food (pulsing glowing orb).
  if (food) {
    const pulse = 0.5 + 0.5 * Math.sin(t * 5);
    const fx = food[0]*CELL + CELL/2, fy = food[1]*CELL + CELL/2;
    ctx.shadowColor = COL.food; ctx.shadowBlur = 12 + pulse * 12;
    ctx.fillStyle = COL.food;
    ctx.beginPath(); ctx.arc(fx, fy, CELL/2 - 3 + pulse*1.5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.beginPath(); ctx.arc(fx - 2.5, fy - 2.5, 2, 0, Math.PI*2); ctx.fill();
  }

  // Snake — glowing gradient body, rounded, head with eyes.
  const len = snake.length;
  for (let i = len - 1; i >= 0; i--) {
    const [sx, sy] = snake[i];
    const px = sx*CELL, py = sy*CELL;
    const head = i === 0;
    const tcol = head ? COL.head : COL.snake;
    ctx.shadowColor = tcol;
    ctx.shadowBlur = head ? 18 : 8;
    // Fade body toward tail slightly.
    const fade = 0.55 + 0.45 * (1 - i / Math.max(len, 1));
    ctx.globalAlpha = head ? 1 : fade;
    ctx.fillStyle = tcol;
    roundRect(px+1.5, py+1.5, CELL-3, CELL-3, head ? 7 : 5); ctx.fill();
    ctx.globalAlpha = 1;
    if (head) drawEyes(px, py);
  }
  ctx.shadowBlur = 0;

  // Particles.
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // Chaos glitch: RGB split scanline flashes.
  if (glitch > 0.02) {
    ctx.save();
    ctx.globalAlpha = glitch * 0.25;
    ctx.fillStyle = "#f38ba8";
    for (let i = 0; i < 3; i++) {
      const gy = Math.random() * HEIGHT;
      ctx.fillRect(0, gy, WIDTH, 2 + Math.random() * 4);
    }
    ctx.restore();
  }

  // ---- HUD ----
  drawHUD(t);

  // Overlays.
  if (paused) centerBanner("PAUSED", "Press Space to resume");
  if (gameOver) overlayGameOver();
  if (flashText && now < flashUntil) {
    const a = Math.min(1, (flashUntil - now) / 400);
    ctx.globalAlpha = a;
    ctx.fillStyle = cfg.accent;
    ctx.font = "800 30px 'Segoe UI', sans-serif";
    ctx.textAlign = "center";
    ctx.shadowColor = cfg.accent; ctx.shadowBlur = 20;
    ctx.fillText(flashText, WIDTH/2, HEIGHT/2 - 40);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }
}

function drawPortal(cell, color, t) {
  const cx = cell[0]*CELL + CELL/2, cy = cell[1]*CELL + CELL/2;
  ctx.save();
  ctx.translate(cx, cy); ctx.rotate(t * 2);
  ctx.strokeStyle = color; ctx.lineWidth = 2.5;
  ctx.shadowColor = color; ctx.shadowBlur = 14;
  for (let r = 3; r <= 8; r += 2.5) {
    ctx.globalAlpha = 0.8 - r*0.05;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 1.5); ctx.stroke();
  }
  ctx.restore();
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}

function drawEyes(px, py) {
  const [dx, dy] = dir;
  ctx.shadowBlur = 0;
  ctx.fillStyle = "#0d0d1a";
  const cx = px + CELL/2, cy = py + CELL/2;
  const ox = dy !== 0 ? 4 : 0, oy = dx !== 0 ? 4 : 0;
  const fx = dx * 3, fy = dy * 3;
  for (const s of [-1, 1]) {
    ctx.beginPath();
    ctx.arc(cx + fx + (dy!==0 ? s*ox : ox*0) , cy + fy + (dx!==0 ? s*oy : 0), 2.1, 0, Math.PI*2);
    // Simplify: place two eyes perpendicular to travel direction.
    ctx.fill();
  }
  // Cleaner eye placement.
  ctx.fillStyle = "#0d0d1a";
  const perp = [dy, -dx];
  for (const s of [-1, 1]) {
    const ex = cx + fx + perp[0]*4*s, ey = cy + fy + perp[1]*4*s;
    ctx.beginPath(); ctx.arc(ex, ey, 2.3, 0, Math.PI*2); ctx.fill();
  }
}

function drawHUD(t) {
  ctx.textAlign = "left";
  ctx.shadowBlur = 0;
  ctx.font = "700 14px Consolas, monospace";
  ctx.fillStyle = COL.text;
  ctx.fillText("Score " + score, 12, 22);

  ctx.textAlign = "right";
  ctx.fillStyle = cfg.accent;
  ctx.font = "700 12px Consolas, monospace";
  ctx.fillText(MODES[mode].name.toUpperCase(), WIDTH - 12, 20);

  ctx.textAlign = "left";
  ctx.fillStyle = COL.dim;
  ctx.font = "12px Consolas, monospace";
  if (mode === "arcade") {
    ctx.fillText(`Lv ${level}  →  ${score}/${target}`, 12, 40);
  }
  if (cfg.timer) {
    const low = timeLeft <= 6;
    ctx.textAlign = "right";
    ctx.fillStyle = low ? "#f38ba8" : "#f9e2af";
    ctx.font = "800 20px Consolas, monospace";
    const secs = Math.max(0, Math.ceil(timeLeft));
    if (!low || Math.floor(t*4) % 2 === 0) ctx.fillText("⏱ " + secs + "s", WIDTH - 12, 44);
  }
  if (performance.now() < invertUntil) {
    ctx.textAlign = "center";
    ctx.fillStyle = "#cba6f7";
    ctx.font = "700 12px Consolas, monospace";
    ctx.fillText("⚡ INVERTED", WIDTH/2, 20);
  }
}

function centerBanner(title, sub) {
  ctx.fillStyle = "rgba(10,10,20,0.55)";
  ctx.fillRect(0, 0, WIDTH, HEIGHT);
  ctx.textAlign = "center";
  ctx.fillStyle = COL.text;
  ctx.font = "800 30px 'Segoe UI', sans-serif";
  ctx.shadowColor = cfg.accent; ctx.shadowBlur = 16;
  ctx.fillText(title, WIDTH/2, HEIGHT/2 - 6);
  ctx.shadowBlur = 0;
  ctx.font = "13px Consolas, monospace";
  ctx.fillStyle = COL.dim;
  ctx.fillText(sub, WIDTH/2, HEIGHT/2 + 24);
}

function overlayGameOver() {
  const won = food === null;
  const pad = 34;
  ctx.fillStyle = "rgba(8,8,16,0.86)";
  roundRect(pad, 16, WIDTH-2*pad, HEIGHT-32, 14); ctx.fill();
  ctx.strokeStyle = cfg.accent; ctx.lineWidth = 2;
  ctx.shadowColor = cfg.accent; ctx.shadowBlur = 18;
  roundRect(pad, 16, WIDTH-2*pad, HEIGHT-32, 14); ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.textAlign = "center";
  ctx.fillStyle = COL.text;
  ctx.font = "800 26px 'Segoe UI', sans-serif";
  ctx.fillText(won ? "🏆 YOU WIN!" : "GAME OVER", WIDTH/2, 52);

  ctx.fillStyle = COL.food;
  ctx.font = "14px Consolas, monospace";
  ctx.fillText(`${MODES[mode].name}  ·  Your score: ${score}`, WIDTH/2, 76);

  ctx.fillStyle = cfg.accent;
  ctx.font = "700 13px Consolas, monospace";
  ctx.fillText("TOP SCORES", WIDTH/2, 102);

  ctx.font = "13px Consolas, monospace";
  ctx.fillStyle = COL.text;
  if (!board || board.length === 0) {
    ctx.fillText("No scores yet — be the first!", WIDTH/2, 130);
  } else {
    board.forEach((e, i) => {
      const rank = String(i+1).padStart(2, " ") + ".";
      const nm = (e.name || "???").slice(0,12).padEnd(12, " ");
      const sc = String(e.score).padStart(4, " ");
      ctx.fillText(`${rank}  ${nm} ${sc}`, WIDTH/2, 126 + i*18);
    });
  }

  ctx.fillStyle = COL.dim;
  ctx.font = "12px Consolas, monospace";
  ctx.fillText("R restart   ·   Esc menu", WIDTH/2, HEIGHT - 30);
}

// ---- Idle attract animation (when menu is open) -------------------------
function renderIdle(now) {
  const t = now / 1000;
  const bg = ctx.createLinearGradient(0, 0, 0, HEIGHT);
  bg.addColorStop(0, "#12122a"); bg.addColorStop(1, "#0a0a14");
  ctx.fillStyle = bg; ctx.fillRect(0, 0, WIDTH, HEIGHT);
  ctx.strokeStyle = COL.grid;
  ctx.beginPath();
  for (let x = 0; x <= WIDTH; x += CELL) { ctx.moveTo(x+.5,0); ctx.lineTo(x+.5,HEIGHT); }
  for (let y = 0; y <= HEIGHT; y += CELL) { ctx.moveTo(0,y+.5); ctx.lineTo(WIDTH,y+.5); }
  ctx.stroke();
  // A little wandering snake for flavor.
  for (let i = 0; i < 8; i++) {
    const x = ((Math.sin(t*0.8 + i*0.5) * 0.5 + 0.5) * (GW-1)) | 0;
    const y = (( (t*3 + i) % GH )) | 0;
    ctx.fillStyle = i === 0 ? COL.head : COL.snake;
    ctx.shadowColor = COL.snake; ctx.shadowBlur = 8;
    roundRect(x*CELL+2, y*CELL+2, CELL-4, CELL-4, 5); ctx.fill();
  }
  ctx.shadowBlur = 0;
}

// ---- Main loop (rAF, fixed-step movement) -------------------------------
function frame(now) {
  const dt = Math.min(50, now - lastT);
  lastT = now;

  if (running) {
    if (!paused && !gameOver) {
      moveAcc += dt;
      while (moveAcc >= speed) { step(); moveAcc -= speed; }
      if (cfg.timer) {
        timeLeft -= dt / 1000;
        if (timeLeft <= 0) { timeLeft = 0; die(); }
      }
    }
    updateParticles(dt);
    shake *= 0.86; glitch *= 0.9;
    render(now);
  } else {
    renderIdle(now);
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
